# merchant_mapping.toml
#
# 新增通路只需在此檔案新增一個 [[rules]] 區塊，不需改 Python code。
# 欄位說明：
#   pattern          - place_name 比對 regex（先 match 先贏，順序很重要）
#   name             - 標準通路名稱
#   affiliation_type - 集團內 / 集團外
#   merchant_category
#   sales_channel

