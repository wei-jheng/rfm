resources:
  jobs:
    ing_set_rfm:
      name: "[${bundle.target}] ing_set_rfm"
      trigger:
        pause_status: UNPAUSED
        table_update:
          table_names:
            - ${var.catalog_silver_source}.${var.schema_bda}.pos_master_member
            - ${var.catalog_silver_source}.${var.schema_opei}.opei_frontend_invoice_list
          wait_after_last_change_seconds: ${var.trigger_wait_after_last_change_seconds}
          condition: ALL_UPDATED
      tags:
        env: ${bundle.target}
        domain: rfm
        owner: data_eng
        resource_type: job
        job_id: J003
      tasks:
        - task_key: dlt_rfm_pipeline
          max_retries: ${var.task_retry_on_failure}
          pipeline_task:
            pipeline_id: ${resources.pipelines.pln_rfm.id}
