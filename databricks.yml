# Databricks Asset Bundle — rfm
# RFM analytics transformation pipeline (silver_standard + gold_mart) for Databricks

bundle:
  name: rfm

include:
  - bundle/pipelines/*.yml
  - bundle/jobs/*.yml

variables:
  whl_version:
    description: "Wheel version, must match the git tag (e.g. 0.1.0). Set automatically by CI via --var=whl_version=<tag>."
    default: "0.1.0"
  today:
    description: "Target execution date (yyyy-MM-dd). Empty = current date in Asia/Taipei."
    default: ""
  catalog_silver_source:
    description: "Unity Catalog name for silver_source layer (input tables from POS/OPEI)."
    default: "sandbox"
  catalog_silver_standard:
    description: "Unity Catalog name for silver_standard layer (fact_txn_unified)."
    default: "sandbox"
  catalog_gold_mart:
    description: "Unity Catalog name for gold_mart layer (RFM analytics tables)."
    default: "sandbox"
  schema_bda:
    description: "Schema for BDA (POS) silver_source tables."
    default: "set_bda"
  schema_opei:
    description: "Schema for OPEI silver_source tables."
    default: "set_opei"
  schema_rfm:
    description: "Schema for rfm pipeline output tables."
    default: "set_wei_jheng"
  slack_notify_destination_id:
    description: "Notification Destination ID → #data-team-notify (job start/success)"
    default: ""
  slack_alert_destination_id:
    description: "Notification Destination ID → #data-team-alert (job failure)"
    default: ""
  task_retry_on_failure:
    description: "Default max retries for each task on failure. Override per task by hardcoding max_retries in the job YAML."
    default: 0
  trigger_wait_after_last_change_seconds:
    description: "Seconds to wait after last table update before triggering ing_set_rfm. sandbox/dev: 30, uat/prod: 600."
    default: 30

targets:
  sandbox:
    mode: development
    default: true
    workspace:
      host: https://dbc-ba4e934d-4f80.cloud.databricks.com
      root_path: ~/.bundle/${bundle.name}
    variables:
      schema_bda: set_wei_jheng
      schema_opei: set_wei_jheng
      schema_rfm: set_wei_jheng

  dev:
    workspace:
      root_path: /Shared/bundles/${bundle.name}/dev
    variables:
      catalog_silver_source: silver_source
      catalog_silver_standard: silver_standard
      catalog_gold_mart: gold_mart
      schema_rfm: rfm
      slack_notify_destination_id: "a24c028f-936d-49f3-a203-7ffeeb1e1925"
      slack_alert_destination_id: "0f3a2d31-52ed-4a69-a2e5-96616cf93ed4"
    resources:
      jobs:
        ing_set_rfm:
          webhook_notifications:
            on_start:
              - id: ${var.slack_notify_destination_id}
            on_success:
              - id: ${var.slack_notify_destination_id}
            on_failure:
              - id: ${var.slack_alert_destination_id}

  uat:
    workspace:
      root_path: /Shared/bundles/${bundle.name}/uat
    variables:
      catalog_silver_source: silver_source
      catalog_silver_standard: silver_standard
      catalog_gold_mart: gold_mart
      schema_rfm: rfm
      trigger_wait_after_last_change_seconds: 600
      slack_notify_destination_id: "b5d86d0f-6489-4ace-baea-a306094ece5a"
      slack_alert_destination_id: "4feefb1d-965a-424b-863d-ed98050a95df"
    resources:
      jobs:
        ing_set_rfm:
          webhook_notifications:
            on_start:
              - id: ${var.slack_notify_destination_id}
            on_success:
              - id: ${var.slack_notify_destination_id}
            on_failure:
              - id: ${var.slack_alert_destination_id}

  prod:
    mode: production
    workspace:
      root_path: /Shared/bundles/${bundle.name}/prod
    variables:
      catalog_silver_source: silver_source
      catalog_silver_standard: silver_standard
      catalog_gold_mart: gold_mart
      schema_rfm: rfm
      trigger_wait_after_last_change_seconds: 600
      slack_notify_destination_id: "51fff447-a32a-46d6-b441-ea7b14113f11"
      slack_alert_destination_id: "377eff5e-8487-4405-89b4-35ac79f83f57"
    resources:
      jobs:
        ing_set_rfm:
          webhook_notifications:
            on_start:
              - id: ${var.slack_notify_destination_id}
            on_success:
              - id: ${var.slack_notify_destination_id}
            on_failure:
              - id: ${var.slack_alert_destination_id}

artifacts:
  rfm:
    type: whl
    path: .
    build: uv build --wheel
