name: Deploy Dev

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    uses: ./.github/workflows/quality.yml
    permissions:
      id-token: write
      contents: read

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_WS_DEV_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_AUDIT_CLIENT_ID }}
      DATABRICKS_TOKEN: ""

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.2"
          python-version: "3.13.0"
          enable-cache: true

      - name: Build wheel
        run: uv build --wheel

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.291.0

      - name: Log auth info
        run: databricks auth env

      - name: Deploy to Dev
        run: |
          WHL_FILE=$(ls dist/*.whl | head -1)
          WHL_VERSION=$(basename "$WHL_FILE" | cut -d'-' -f2)
          databricks bundle deploy -t dev \
            --var="whl_version=$WHL_VERSION"
