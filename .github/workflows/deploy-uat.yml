name: Deploy UAT

on:
  push:
    branches: [uat]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      id-token: write
      contents: read
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_WS_UAT_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_AUDIT_CLIENT_ID }}
      DATABRICKS_TOKEN: ""

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.2"
          python-version: "3.13.0"
          enable-cache: true

      - name: Build wheel
        run: uv build --wheel

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.291.0

      - name: Log auth info
        run: databricks auth env

      - name: Validate bundle (uat)
        run: databricks bundle validate -t uat

      - name: Deploy to UAT
        run: |
          WHL_FILE=$(ls dist/*.whl | head -1)
          WHL_VERSION=$(basename "$WHL_FILE" | cut -d'-' -f2)
          databricks bundle deploy -t uat \
            --var="whl_version=$WHL_VERSION"
