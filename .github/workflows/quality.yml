name: Quality

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_WS_DEV_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_AUDIT_CLIENT_ID }}
      DATABRICKS_TOKEN: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.2"
          python-version: "3.13.0"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Lint
        run: uv run ruff check src/

      - name: Format check
        run: uv run ruff format --check src/

      - name: Type check
        run: uv run mypy src/

      - name: Test
        run: uv run pytest

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.291.0

      - name: Log auth info
        run: databricks auth env

      - name: Validate bundle (dev)
        run: databricks bundle validate -t dev
